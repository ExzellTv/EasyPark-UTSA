<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Debug mode for Easy Park UTSA showing frame differences and motion metrics" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>Debug Parking Feed | Easy Park UTSA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body {
      background-color: #0a0e1a;
    }

    .panel {
      background: #151b2e;
      border: 1px solid #1f2937;
    }

    .stat-card {
      background: #1a2236;
      border: 1px solid #1f2937;
    }

    .video-container {
      position: relative;
      overflow: hidden;
      border-radius: 0.75rem;
      background: #151b2e;
      border: 1px solid #1f2937;
    }

    .debug-badge {
      background: #1a2236;
      border: 1px solid #1f2937;
      transition: all 0.2s ease;
    }

    .debug-badge:hover {
      background: #1f2847;
    }

    .debug-indicator {
      animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
  <script>
    let errorCount = 0;
    const MAX_ERRORS = 3;

    async function fetchDebugSpots() {
      try {
        const res = await fetch("/parking/spots?debug=true");

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        }

        const data = await res.json();

        if (data.error) {
          throw new Error(data.error);
        }

        const { total, occupied, available } = data.summary;

        // Update counts
        updateCount("totalCount", total, "text-yellow-400");
        updateCount("openCount", available, "text-green-400");
        updateCount("occCount", occupied, "text-red-400");

        // Update debug list
        const list = document.getElementById("spotList");
        list.innerHTML = "";

        data.spots.forEach(s => {
          const item = document.createElement("li");
          const isOccupied = s.status === "occupied";
          item.className = "debug-badge px-4 py-3 rounded-lg text-sm font-medium";
          item.setAttribute("role", "listitem");

          const statusColor = isOccupied ? "text-red-400" : "text-emerald-400";
          const diffValue = s.diff ?? 0;

          item.innerHTML = `
            <div class="flex justify-between items-center">
              <span class="${statusColor} font-semibold">Spot ${s.id}</span>
              <span class="text-xs text-gray-400 bg-gray-900/40 px-2 py-1 rounded">${s.status}</span>
            </div>
            <div class="flex justify-between items-center mt-2 text-xs text-amber-400">
              <span>Δ: ${diffValue.toFixed(2)}</span>
            </div>
          `;
          item.setAttribute("aria-label", `Spot ${s.id} is ${s.status}, frame difference: ${diffValue.toFixed(2)}`);

          list.appendChild(item);
        });

        // Reset error counter
        errorCount = 0;
        hideError();

      } catch (e) {
        console.error("Error fetching debug data", e);
        errorCount++;

        if (errorCount >= MAX_ERRORS) {
          showError(`Failed to load debug data: ${e.message}`);
        }
      }
    }

    function updateCount(id, value, colorClass) {
      const el = document.getElementById(id);
      if (el) {
        el.textContent = value;
        el.className = `text-4xl font-bold ${colorClass} mb-1`;
      }
    }

    function showError(message) {
      const banner = document.getElementById("error-banner");
      if (banner) {
        banner.querySelector("p").textContent = message;
        banner.classList.remove("hidden");
      }
    }

    function hideError() {
      const banner = document.getElementById("error-banner");
      if (banner) {
        banner.classList.add("hidden");
      }
    }

    function handleVideoError() {
      showError("Debug video feed unavailable. Please check camera connection.");
    }

    // Initialize
    setInterval(fetchDebugSpots, 2000);
    window.onload = () => {
      fetchDebugSpots();

      // Add error handler for video feed
      const videoImg = document.getElementById("debug-video-feed");
      if (videoImg) {
        videoImg.addEventListener("error", handleVideoError);
      }

      // GSAP animations
      gsap.from(".video-container", {
        opacity: 0,
        scale: 0.95,
        duration: 0.6,
        ease: "power2.out"
      });

      gsap.from(".panel", {
        opacity: 0,
        x: 30,
        duration: 0.6,
        ease: "power2.out"
      });

      gsap.from("header", {
        opacity: 0,
        y: -20,
        duration: 0.5,
        ease: "power2.out"
      });
    };
  </script>
</head>
<body class="text-white min-h-screen flex flex-col">
  <!-- Error Banner -->
  <div id="error-banner" role="alert" aria-live="assertive" class="hidden fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-red-600 text-white px-6 py-3 rounded-lg border border-red-500 max-w-md text-center">
    <p class="text-sm font-medium"></p>
  </div>

  <!-- Header -->
  <header class="w-full bg-[#0f1422] border-b border-gray-800 py-6">
    <div class="container mx-auto px-6 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-amber-600 rounded-lg flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
          </svg>
        </div>
        <h1 class="text-xl font-semibold text-white">
          Debug Mode
        </h1>
        <div class="flex items-center space-x-2 ml-4">
          <div class="w-2 h-2 bg-amber-400 rounded-full debug-indicator"></div>
          <span class="text-xs text-amber-400 font-medium uppercase tracking-wide">Debug Active</span>
        </div>
      </div>
      <a href="/" class="px-4 py-2 bg-amber-600 hover:bg-amber-700 rounded-lg text-sm font-medium text-white transition-colors">
        ← Dashboard
      </a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow container mx-auto px-6 py-10 grid lg:grid-cols-3 gap-6">
    <!-- Debug video feed -->
    <div class="lg:col-span-2 flex flex-col">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-semibold text-white">
          Live Debug Stream
        </h2>
      </div>
      <div class="video-container">
        <img id="debug-video-feed" src="/parking/video_feed?debug=true" alt="Debug parking feed showing motion and brightness metrics with frame difference overlays" class="w-full h-auto" loading="lazy" />
      </div>
      <p class="text-gray-400 text-sm mt-4 text-center">
        Feed includes motion & brightness overlays for real-time debugging • Δ = frame difference metric
      </p>
    </div>

    <!-- Stats panel -->
    <div class="panel rounded-xl p-6 flex flex-col">
      <h3 class="text-xl font-semibold mb-6 text-white">
        Debug Status
      </h3>

      <div class="grid grid-cols-1 gap-4 mb-6">
        <div class="stat-card rounded-lg p-5 text-center">
          <p class="text-4xl font-semibold text-emerald-400 mb-1" id="openCount">–</p>
          <p class="text-sm text-gray-400 uppercase tracking-wide">Available Spots</p>
        </div>
        <div class="stat-card rounded-lg p-5 text-center">
          <p class="text-4xl font-semibold text-red-400 mb-1" id="occCount">–</p>
          <p class="text-sm text-gray-400 uppercase tracking-wide">Occupied Spots</p>
        </div>
        <div class="stat-card rounded-lg p-5 text-center">
          <p class="text-4xl font-semibold text-amber-400 mb-1" id="totalCount">–</p>
          <p class="text-sm text-gray-400 uppercase tracking-wide">Total Spots</p>
        </div>
      </div>

      <div class="border-t border-gray-700 pt-6">
        <h4 class="text-sm text-gray-400 mb-4 uppercase tracking-wide font-medium">Debug Data Stream</h4>
        <ul id="spotList" class="space-y-2 overflow-y-auto h-96 pr-2 custom-scrollbar" role="list" aria-live="polite" aria-label="Debug data with frame differences for each parking spot"></ul>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full bg-[#0f1422] py-6 border-t border-gray-800 text-center">
    <p class="text-gray-500 text-sm">Easy Park UTSA © 2025 — Debug Console</p>
  </footer>

  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #1a2236;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #374151;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #4b5563;
    }
  </style>
</body>
</html>
