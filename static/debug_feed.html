<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debug Parking Feed | Easy Park UTSA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    async function fetchDebugSpots() {
      try {
        const res = await fetch("/parking/spots?debug=true");
        const data = await res.json();
        const { total, occupied, available } = data.summary;
        document.getElementById("totalCount").textContent = total;
        document.getElementById("openCount").textContent = available;
        document.getElementById("occCount").textContent = occupied;

        const list = document.getElementById("spotList");
        list.innerHTML = "";
        data.spots.forEach(s => {
          const item = document.createElement("li");
          item.className =
            `px-4 py-2 rounded-md text-sm font-medium flex justify-between ${
              s.status === "occupied"
                ? "bg-red-500/20 text-red-300 border border-red-700"
                : "bg-green-500/20 text-green-300 border border-green-700"
            }`;
          item.innerHTML = `
            <span>Spot ${s.id}: ${s.status}</span>
            <span class="text-xs text-slate-400">B:${s.brightness ?? "–"} | M:${(s.motion_ratio ?? 0 * 100).toFixed(1)}%</span>
          `;
          list.appendChild(item);
        });
      } catch (e) {
        console.error("Error fetching debug data", e);
      }
    }
    setInterval(fetchDebugSpots, 2000);
    window.onload = fetchDebugSpots;
  </script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col">
  <header class="bg-slate-900/70 border-b border-slate-800 py-4 shadow-md">
    <div class="container mx-auto px-6 flex justify-between items-center">
      <h1 class="text-2xl font-semibold text-yellow-400">🧠 Debug Mode</h1>
      <a href="/" class="text-sm text-cyan-300 hover:text-cyan-200">← Back to Dashboard</a>
    </div>
  </header>

  <main class="flex-grow container mx-auto px-6 py-10 grid lg:grid-cols-3 gap-8">
    <!-- Debug video feed -->
    <div class="lg:col-span-2 flex flex-col items-center">
      <h2 class="text-xl font-semibold text-yellow-300 mb-4">Live Debug Stream</h2>
      <img src="/parking/video_feed?debug=true" alt="Debug Feed"
           class="rounded-2xl border border-yellow-800 shadow-lg w-full max-w-4xl" />
      <p class="text-slate-500 text-sm mt-2">
        Feed includes motion & brightness overlays for real-time debugging.
      </p>
    </div>

    <!-- Stats panel -->
    <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6 shadow-lg flex flex-col">
      <h3 class="text-lg font-semibold text-yellow-300 mb-4">Current Status</h3>
      <div class="grid grid-cols-3 gap-2 text-center mb-6">
        <div>
          <p class="text-3xl font-bold text-green-400" id="openCount">–</p>
          <p class="text-xs text-slate-400">Open</p>
        </div>
        <div>
          <p class="text-3xl font-bold text-red-400" id="occCount">–</p>
          <p class="text-xs text-slate-400">Occupied</p>
        </div>
        <div>
          <p class="text-3xl font-bold text-yellow-400" id="totalCount">–</p>
          <p class="text-xs text-slate-400">Total</p>
        </div>
      </div>

      <h4 class="text-sm text-slate-400 mb-2 uppercase tracking-wide">Debug Data</h4>
      <ul id="spotList" class="space-y-2 overflow-y-auto h-64 p-1 border border-slate-800 rounded-md bg-slate-800/30"></ul>
    </div>
  </main>

  <footer class="w-full bg-slate-900/70 py-4 border-t border-slate-800 text-center text-sm text-slate-500">
    Easy Park UTSA © 2025
  </footer>
</body>
</html>
