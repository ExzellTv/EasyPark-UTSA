<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debug Parking Feed | Easy Park UTSA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .gradient-bg {
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e293b);
      background-size: 400% 400%;
      animation: gradient-shift 15s ease infinite;
    }

    .glass-panel {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .glossy-btn {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.9), rgba(245, 158, 11, 0.9));
      box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }

    .glossy-btn:hover {
      background: linear-gradient(135deg, rgba(251, 191, 36, 1), rgba(245, 158, 11, 1));
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(251, 191, 36, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.3);
    }

    .glossy-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }

    .glossy-btn:hover::before {
      left: 100%;
    }

    .stat-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: scale(1.05);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .video-container {
      position: relative;
      overflow: hidden;
      border-radius: 1.5rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(251, 191, 36, 0.3);
    }

    .video-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #fbbf24, #f59e0b, #d97706);
      z-index: 10;
    }

    .debug-badge {
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(245, 158, 11, 0.15));
      border: 1px solid rgba(251, 191, 36, 0.4);
      transition: all 0.2s ease;
    }

    .debug-badge:hover {
      transform: translateX(4px);
      border: 1px solid rgba(251, 191, 36, 0.6);
    }

    @keyframes pulse-debug {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .debug-indicator {
      animation: pulse-debug 1.5s ease-in-out infinite;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(251, 191, 36, 0.8), transparent);
      animation: scan 3s linear infinite;
      z-index: 5;
    }
  </style>
  <script>
    async function fetchDebugSpots() {
      try {
        const res = await fetch("/parking/spots?debug=true");
        const data = await res.json();
        const { total, occupied, available } = data.summary;
        document.getElementById("totalCount").textContent = total;
        document.getElementById("openCount").textContent = available;
        document.getElementById("occCount").textContent = occupied;

        const list = document.getElementById("spotList");
        list.innerHTML = "";
        data.spots.forEach(s => {
          const item = document.createElement("li");
          const isOccupied = s.status === "occupied";
          item.className = "debug-badge px-4 py-3 rounded-xl text-sm font-medium";

          const statusColor = isOccupied ? "text-red-300" : "text-green-300";
          const diffValue = s.diff ?? 0;

          item.innerHTML = `
            <div class="flex justify-between items-center">
              <span class="${statusColor} font-bold">Spot ${s.id}</span>
              <span class="text-xs text-slate-400 bg-slate-900/40 px-2 py-1 rounded">${s.status}</span>
            </div>
            <div class="flex justify-between items-center mt-2 text-xs text-yellow-300">
              <span>Δ: ${diffValue.toFixed(2)}</span>
            </div>
          `;
          list.appendChild(item);
        });
      } catch (e) {
        console.error("Error fetching debug data", e);
      }
    }
    setInterval(fetchDebugSpots, 2000);
    window.onload = fetchDebugSpots;
  </script>
</head>
<body class="gradient-bg text-white min-h-screen flex flex-col">
  <!-- Header -->
  <header class="w-full bg-slate-900/50 backdrop-blur-md border-b border-yellow-700/30 py-5 shadow-2xl">
    <div class="container mx-auto px-6 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-lg flex items-center justify-center shadow-lg">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
          </svg>
        </div>
        <h1 class="text-2xl font-bold bg-gradient-to-r from-yellow-300 to-orange-400 bg-clip-text text-transparent">
          Debug Mode
        </h1>
        <div class="flex items-center space-x-2 ml-4">
          <div class="w-2 h-2 bg-yellow-400 rounded-full debug-indicator"></div>
          <span class="text-xs text-yellow-400 font-semibold uppercase tracking-wide">Debug Active</span>
        </div>
      </div>
      <a href="/" class="glossy-btn px-5 py-2 rounded-xl text-sm font-semibold text-white">
        ← Dashboard
      </a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow container mx-auto px-6 py-10 grid lg:grid-cols-3 gap-8">
    <!-- Debug video feed -->
    <div class="lg:col-span-2 flex flex-col">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold bg-gradient-to-r from-yellow-200 to-orange-300 bg-clip-text text-transparent">
          Live Debug Stream
        </h2>
      </div>
      <div class="video-container">
        <div class="scan-line"></div>
        <img src="/parking/video_feed?debug=true" alt="Debug Feed" class="w-full h-auto" />
      </div>
      <p class="text-slate-400 text-sm mt-4 text-center">
        Feed includes motion & brightness overlays for real-time debugging • Δ = frame difference metric
      </p>
    </div>

    <!-- Stats panel -->
    <div class="glass-panel rounded-3xl p-6 shadow-2xl flex flex-col">
      <h3 class="text-xl font-bold mb-6 bg-gradient-to-r from-yellow-200 to-orange-300 bg-clip-text text-transparent">
        Debug Status
      </h3>

      <div class="grid grid-cols-1 gap-4 mb-6">
        <div class="stat-card rounded-2xl p-5 text-center">
          <p class="text-4xl font-bold text-green-400 mb-1" id="openCount">–</p>
          <p class="text-sm text-slate-300 uppercase tracking-wide">Available Spots</p>
        </div>
        <div class="stat-card rounded-2xl p-5 text-center">
          <p class="text-4xl font-bold text-red-400 mb-1" id="occCount">–</p>
          <p class="text-sm text-slate-300 uppercase tracking-wide">Occupied Spots</p>
        </div>
        <div class="stat-card rounded-2xl p-5 text-center">
          <p class="text-4xl font-bold text-yellow-400 mb-1" id="totalCount">–</p>
          <p class="text-sm text-slate-300 uppercase tracking-wide">Total Spots</p>
        </div>
      </div>

      <div class="border-t border-yellow-700/30 pt-6">
        <h4 class="text-sm text-slate-400 mb-4 uppercase tracking-wide font-semibold">Debug Data Stream</h4>
        <ul id="spotList" class="space-y-2 overflow-y-auto h-96 pr-2 custom-scrollbar"></ul>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full bg-slate-900/50 backdrop-blur-md py-6 border-t border-yellow-700/30 text-center">
    <p class="text-slate-400 text-sm">Easy Park UTSA © 2025 — Debug Console</p>
  </footer>

  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(30, 41, 59, 0.5);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(251, 191, 36, 0.4);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(251, 191, 36, 0.6);
    }
  </style>
</body>
</html>
